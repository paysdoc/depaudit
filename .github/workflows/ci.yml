name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OSV_SCANNER_VERSION: v2.3.5
      OSV_SCANNER_SHA256: bb30c580afe5e757d3e959f4afd08a4795ea505ef84c46962b9a738aa573b41b
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Install osv-scanner
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  /tmp/osv-scanner" | sha256sum -c -
          sudo install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test

      - name: E2E tests
        run: bun run test:e2e
